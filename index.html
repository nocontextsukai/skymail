<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="theme-color" content="#f2f2f7">
<title>받은 편지함</title>
<style>
  :root {
    --bg: #f2f2f7;
    --bg-elev: #ffffff;
    --sep: rgba(60,60,67,0.18);
    --sep-light: rgba(60,60,67,0.08);
    --text: #000000;
    --text-2: #3c3c43;
    --text-3: #8e8e93;
    --blue: #007aff;
    --blue-soft: rgba(0,122,255,0.1);
    --red: #ff3b30;
    --orange: #ff9500;
    --green: #34c759;
    --search-bg: rgba(118,118,128,0.12);
    --row-active: rgba(118,118,128,0.18);
    --shadow: 0 1px 0 rgba(0,0,0,0.04);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --bg-elev: #1c1c1e;
      --sep: rgba(84,84,88,0.65);
      --sep-light: rgba(84,84,88,0.3);
      --text: #ffffff;
      --text-2: #ebebf5;
      --text-3: #ebebf599;
      --blue: #0a84ff;
      --blue-soft: rgba(10,132,255,0.18);
      --search-bg: rgba(118,118,128,0.24);
      --row-active: rgba(118,118,128,0.32);
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
      "Apple SD Gothic Neo", "Noto Sans KR", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-size: 17px;
    line-height: 1.35;
    overscroll-behavior-y: none;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
  }
  .app {
    max-width: 540px;
    margin: 0 auto;
    background: var(--bg);
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
    overflow-x: hidden;
  }
  @media (min-width: 720px) {
    .app {
      box-shadow: 0 0 0 1px var(--sep-light), 0 30px 80px rgba(0,0,0,0.08);
    }
  }

  /* ---------- Inbox view ---------- */
  .inbox-view, .detail-view {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    background: var(--bg);
    -webkit-overflow-scrolling: touch;
    transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
    will-change: transform;
  }
  .detail-view {
    transform: translateX(100%);
    z-index: 2;
  }
  .app.show-detail .inbox-view { transform: translateX(-22%); }
  .app.show-detail .detail-view { transform: translateX(0); }

  .nav-bar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    background: color-mix(in srgb, var(--bg) 86%, transparent);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    padding: calc(var(--safe-top) + 6px) 16px 6px;
    border-bottom: 0.5px solid var(--sep-light);
  }
  .nav-row {
    display: flex; align-items: center; justify-content: space-between;
    height: 36px;
  }
  .nav-title {
    font-size: 17px; font-weight: 600;
  }
  .nav-back {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--blue); font-size: 17px;
    background: none; border: 0; padding: 4px 4px 4px 0;
    cursor: pointer;
  }
  .nav-back svg { width: 13px; height: 22px; }
  .nav-actions {
    color: var(--blue);
    font-size: 17px;
    cursor: pointer;
  }
  .nav-actions:hover { opacity: 0.7; }
  .large-title {
    font-size: 34px; font-weight: 700; letter-spacing: -0.4px;
    padding: 6px 0 10px;
  }
  .search-wrap {
    padding: 0 0 10px;
  }
  .search-box {
    display: flex; align-items: center; gap: 6px;
    background: var(--search-bg);
    border-radius: 10px;
    padding: 7px 10px;
    color: var(--text-3);
  }
  .search-box svg { width: 16px; height: 16px; flex-shrink: 0; }
  .search-box input {
    flex: 1; min-width: 0;
    background: transparent; border: 0; outline: none;
    color: var(--text); font-size: 17px;
    padding: 0;
  }
  .search-box input::placeholder { color: var(--text-3); }

  .list {
    background: var(--bg-elev);
    margin: 0;
    padding-bottom: calc(var(--safe-bottom) + 60px);
  }
  .list-row {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 4px 6px;
    padding: 11px 16px 11px 8px;
    border-bottom: 0.5px solid var(--sep-light);
    cursor: pointer;
    background: var(--bg-elev);
    position: relative;
    align-items: start;
  }
  .list-row:active { background: var(--row-active); }
  .unread-dot {
    grid-row: 1 / span 3;
    align-self: center;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--blue);
    margin: 0 auto;
    opacity: 0;
  }
  .list-row.unread .unread-dot { opacity: 1; }
  .list-from {
    grid-column: 2;
    font-size: 16px; font-weight: 600;
    color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .list-date {
    grid-column: 3;
    font-size: 13px; color: var(--text-3);
    display: flex; align-items: center; gap: 4px;
    white-space: nowrap;
  }
  .list-date svg {
    width: 8px; height: 14px;
    flex-shrink: 0;
  }
  .list-subject {
    grid-column: 2 / span 2;
    font-size: 15px; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .list-preview {
    grid-column: 2 / span 2;
    font-size: 14px; color: var(--text-3);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .list-attach {
    display: inline-block; margin-left: 4px;
    color: var(--text-3);
  }
  .empty {
    text-align: center;
    color: var(--text-3);
    padding: 60px 24px;
  }
  .footer-count {
    text-align: center;
    color: var(--text-3);
    font-size: 13px;
    padding: 20px 0 40px;
  }

  /* ---------- Detail view ---------- */
  .detail-scroll {
    padding: 12px 16px calc(var(--safe-bottom) + 60px);
  }
  .mail-subject {
    font-size: 22px; font-weight: 700; letter-spacing: -0.3px;
    margin: 4px 0 14px;
    line-height: 1.25;
    word-break: break-word;
  }
  .mail-header {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    gap: 4px 12px;
    padding: 10px 0;
    align-items: center;
    border-bottom: 0.5px solid var(--sep-light);
  }
  .avatar {
    grid-row: 1 / span 2;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--blue);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 17px;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .from-name {
    font-size: 16px; font-weight: 600;
    color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .to-line {
    font-size: 14px; color: var(--text-3);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .to-line .to-label { color: var(--text-3); }
  .mail-date {
    font-size: 14px; color: var(--text-3);
    white-space: nowrap;
  }
  .mail-body-frame {
    width: 100%;
    height: auto;
    border: 0;
    background: var(--bg-elev);
    border-radius: 0;
    margin-top: 10px;
    min-height: 200px;
    display: block;
  overflow: hidden;
}
  .mail-meta-line {
    font-size: 13px; color: var(--text-3);
    margin: 14px 0 0;
  }
  .attachment-list {
    margin-top: 16px;
  }
  .attachment-list h4 {
    font-size: 13px; color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    margin: 0 0 8px;
  }
  .attachment-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--bg-elev);
    border-radius: 10px;
    text-decoration: none;
    color: var(--text);
    margin-bottom: 6px;
    border: 0.5px solid var(--sep-light);
  }
  .attachment-row .att-icon {
    width: 32px; height: 32px; border-radius: 6px;
    background: var(--blue-soft);
    display: flex; align-items: center; justify-content: center;
    color: var(--blue); font-size: 14px; font-weight: 600;
    flex-shrink: 0;
  }
  .attachment-row .att-name {
    flex: 1; min-width: 0;
    font-size: 15px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .attachment-row .att-size {
    color: var(--text-3); font-size: 13px;
  }

  /* Bottom toolbar (cosmetic, iOS-like) */
  .tool-bar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    max-width: 540px;
    margin: 0 auto;
    padding: 10px 18px calc(var(--safe-bottom) + 10px);
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 0.5px solid var(--sep-light);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; color: var(--text-3);
    z-index: 20;
    pointer-events: none;
  }
  .tool-bar .tool-icon {
    color: var(--blue);
    font-size: 22px;
    pointer-events: none;
    opacity: 0.5;
  }

  /* loading */
  .loading {
    text-align: center;
    padding: 60px 0;
    color: var(--text-3);
    font-size: 15px;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--sep);
    border-top-color: var(--text-3);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* highlight search match */
  .hl { background: rgba(255,204,0,0.35); border-radius: 2px; }
        
.year-filter-panel {
  display: none;

  background: color-mix(in srgb, var(--bg) 75%, transparent);

  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);

  border-top: 0.5px solid var(--sep-light);
  border-bottom: 0.5px solid var(--sep-light);

  padding: 12px;
  gap: 10px;

  flex-wrap: wrap;
}
.year-filter-panel.open {
  display: flex;
}

.year-filter-item {
  padding: 10px 14px;
  border-radius: 999px;
  background: var(--search-bg);

  display: flex;
  align-items: center;
  gap: 4px;

  cursor: pointer;

  font-size: 14px;
  border: 1px solid transparent;
}

.year-filter-item.active {
  font-weight: 700;
  border-color: var(--blue);
  color: var(--blue);
}

.year-filter-count {
  opacity: 0.7;
  font-size: 12px;
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- INBOX -->
  <div class="inbox-view" id="inboxView">
    <header class="nav-bar">
<div class="nav-row">
  <div></div>
  <div class="nav-title">받은 편지함</div>
  <span class="nav-actions" onclick="toggleYearFilter()">필터</span>
</div>
      <h1 class="large-title">받은 편지함</h1>
      <div class="search-wrap">
        <label class="search-box">
          <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M11.74 10.34a5.5 5.5 0 1 0-1.4 1.4l3.21 3.21a1 1 0 0 0 1.4-1.4l-3.2-3.21zM7 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/>
          </svg>
          <input id="searchInput" type="text" placeholder="검색" autocomplete="off" />
        </label>
      </div>
      <div id="yearFilterPanel" class="year-filter-panel"></div>
    </header>
    <div id="listContainer" class="list">
      <div class="loading"><span class="spinner"></span>편지함 불러오는 중…</div>
    </div>
  </div>

  <!-- DETAIL -->
  <div class="detail-view" id="detailView">
    <header class="nav-bar">
      <div class="nav-row">
        <button class="nav-back" onclick="closeDetail()" aria-label="뒤로">
          <svg viewBox="0 0 13 22" fill="currentColor"><path d="M11.39 1.4 1.79 11l9.6 9.6"
            stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>받은 편지함</span>
        </button>
        <span class="nav-actions" onclick="toggleYearFilter()">…</span>
      </div>
    </header>
    <div class="detail-scroll" id="detailScroll">
      <div class="loading"><span class="spinner"></span>본문 불러오는 중…</div>
    </div>
  </div>

  <div class="tool-bar" aria-hidden="true">
    <span id="updatedAt">업데이트됨</span>
    <span class="tool-icon">✎</span>
  </div>
</div>

<script>
"use strict";

const app = document.getElementById('app');
const inboxView = document.getElementById('inboxView');
const detailView = document.getElementById('detailView');
const listContainer = document.getElementById('listContainer');
const detailScroll = document.getElementById('detailScroll');
const searchInput = document.getElementById('searchInput');
const updatedAt = document.getElementById('updatedAt');

let allMails = [];
let filteredMails = [];
let renderedCount = 0;
let currentYearFilter = null;

const yearFilterPanel = document.getElementById('yearFilterPanel');
const PAGE_SIZE = 60;

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) {
    return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
  }
  const yest = new Date(now); yest.setDate(now.getDate() - 1);
  if (d.toDateString() === yest.toDateString()) return '어제';
  const oneWeek = 7 * 24 * 3600 * 1000;
  if (now - d < oneWeek) {
    return ['일','월','화','수','목','금','토'][d.getDay()] + '요일';
  }
  if (d.getFullYear() === now.getFullYear()) {
    return (d.getMonth() + 1) + '월 ' + d.getDate() + '일';
  }
  return d.getFullYear() + '. ' + (d.getMonth() + 1) + '. ' + d.getDate() + '.';
}

function formatDetailDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short', hour: '2-digit', minute: '2-digit', hour12: false };
  return d.toLocaleString('ko-KR', opts);
}

function avatarLetter(name) {
  if (!name) return '?';
  const c = Array.from(name.trim())[0] || '?';
  return c;
}

function highlightText(text, query) {
  if (!query) return escapeHtml(text);
  const lower = text.toLowerCase();
  const q = query.toLowerCase();
  let out = '';
  let i = 0;
  while (i < text.length) {
    const idx = lower.indexOf(q, i);
    if (idx === -1) { out += escapeHtml(text.slice(i)); break; }
    out += escapeHtml(text.slice(i, idx));
    out += '<span class="hl">' + escapeHtml(text.slice(idx, idx + q.length)) + '</span>';
    i = idx + q.length;
  }
  return out;
}

function renderListRow(m, query) {
  const safeFrom = highlightText(m.from_name || m.from_addr || '(보낸이 없음)', query);
  const safeSubject = highlightText(m.subject || '(제목 없음)', query);
let previewText = m.preview || '';

if (m.subject) {
  previewText = previewText.replace(m.subject, '').trim();
}

const safePreview = highlightText(previewText, query);
  const dateStr = formatDate(m.date);
  const attachIcon = m.has_attachments
    ? '<span class="list-attach" title="첨부 있음">📎</span>' : '';
  return `
    <div class="list-row unread" data-id="${escapeHtml(m.id)}" onclick="openMail('${encodeURIComponent(m.id)}')">
      <div class="unread-dot"></div>
      <div class="list-from">${safeFrom}</div>
      <div class="list-date">${escapeHtml(dateStr)} <svg viewBox="0 0 8 14" fill="currentColor"><path d="M1 1l5 5.5L1 12" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="list-subject">${safeSubject}${attachIcon}</div>
      <div class="list-preview">${safePreview}</div>
    </div>
  `;
}

function renderList(reset) {
  if (reset) {
    listContainer.innerHTML = '';
    renderedCount = 0;
  }
  if (filteredMails.length === 0) {
    listContainer.innerHTML = '<div class="empty">메일이 없습니다.</div>';
    return;
  }
  const q = searchInput.value.trim();
  const end = Math.min(renderedCount + PAGE_SIZE, filteredMails.length);
  const slice = filteredMails.slice(renderedCount, end);
  const html = slice.map(m => renderListRow(m, q)).join('');
  // append
  const tempContainer = document.createElement('div');
  tempContainer.innerHTML = html;
  // remove old loading/footer if any
  const oldFooter = listContainer.querySelector('.footer-count');
  if (oldFooter) oldFooter.remove();
  while (tempContainer.firstChild) listContainer.appendChild(tempContainer.firstChild);
  renderedCount = end;

  const footer = document.createElement('div');
  footer.className = 'footer-count';
  if (renderedCount < filteredMails.length) {
    footer.textContent = `${renderedCount} / ${filteredMails.length}개 표시 중 · 스크롤하여 더 보기`;
  } else {
    footer.textContent = `${filteredMails.length}개 메일`;
  }
  listContainer.appendChild(footer);
}

function applyFilter() {
  const q = searchInput.value.trim().toLowerCase();

  filteredMails = allMails.filter(m => {

    // 연도 필터
    if (currentYearFilter !== null) {
      const year = new Date(m.date).getFullYear();

      if (year !== currentYearFilter) {
        return false;
      }
    }

    // 검색 필터
    if (!q) return true;

    return (
      (m.subject || '').toLowerCase().includes(q) ||
      (m.from_name || '').toLowerCase().includes(q) ||
      (m.preview || '').toLowerCase().includes(q)
    );
  });

  renderList(true);
}



// Infinite scroll
inboxView.addEventListener('scroll', () => {
  if (renderedCount >= filteredMails.length) return;
  const remaining = inboxView.scrollHeight - inboxView.scrollTop - inboxView.clientHeight;
  if (remaining < 400) renderList(false);
});

// Search input
let searchTimer = null;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilter, 120);
});

// Open mail detail
async function openMail(encodedId) {
  const id = decodeURIComponent(encodedId);
  // mark as read visually
  const row = listContainer.querySelector(`.list-row[data-id="${CSS.escape(id)}"]`);
  if (row) row.classList.remove('unread');

  app.classList.add('show-detail');
  detailScroll.innerHTML = '<div class="loading"><span class="spinner"></span>본문 불러오는 중…</div>';
  detailView.scrollTop = 0;
  // change url hash
  history.pushState({ mailId: id }, '', '#m=' + encodeURIComponent(id));

  try {
    const res = await fetch('data/mails/' + encodeURI(id) + '.json');
    if (!res.ok) throw new Error('not found');
    const d = await res.json();
    renderDetail(d);
  } catch (e) {
    detailScroll.innerHTML = '<div class="empty">메일을 불러올 수 없습니다.<br><small>' + escapeHtml(e.message) + '</small></div>';
  }
}

function renderDetail(d) {
  const from = d.from_name || d.from_addr || '(보낸이 없음)';
  const subject = d.subject || '(제목 없음)';
  const dateStr = formatDetailDate(d.date);
  const avatar = avatarLetter(from);

  // Build attachments
  let attachmentsHtml = '';
  if (d.attachments && d.attachments.length) {
    const items = d.attachments.map(a => {
      const ext = (a.filename || '').split('.').pop().slice(0, 4).toUpperCase() || 'FILE';
      const sizeKb = a.size ? Math.round(a.size / 1024) + ' KB' : '';
      return `<a class="attachment-row" href="${escapeHtml(a.path)}" target="_blank" rel="noopener">
        <div class="att-icon">${escapeHtml(ext.slice(0,3))}</div>
        <div class="att-name">${escapeHtml(a.filename)}</div>
        <div class="att-size">${escapeHtml(sizeKb)}</div>
      </a>`;
    }).join('');
    attachmentsHtml = '<div class="attachment-list"><h4>첨부 파일</h4>' + items + '</div>';
  }

  detailScroll.innerHTML = `
    <h1 class="mail-subject">${escapeHtml(subject)}</h1>
    <div class="mail-header">
      <div class="avatar">${escapeHtml(avatar)}</div>
      <div class="from-name">${escapeHtml(from)}</div>
      <div class="mail-date">${escapeHtml(formatDate(d.date))}</div>
      <div></div>
      <div class="to-line"><span class="to-label">받는 사람: </span>${escapeHtml('****')}</div>
      <div></div>
    </div>
    <p class="mail-meta-line">${escapeHtml(dateStr)}</p>
    <iframe class="mail-body-frame" scrolling="no" id="bodyFrame" sandbox="allow-popups allow-popups-to-escape-sandbox" referrerpolicy="no-referrer"></iframe>
    ${attachmentsHtml}
  `;

  const frame = document.getElementById('bodyFrame');
  frame.onload = () => {
  try {
    const doc = frame.contentWindow.document;

    const resize = () => {
      frame.style.height =
        doc.documentElement.scrollHeight + 'px';
    };

    resize();

    setTimeout(resize, 300);
    setTimeout(resize, 1000);

  } catch (e) {
    console.log(e);
  }
};
  // Use srcdoc with a self-contained doc; resolve relative urls correctly by setting a <base>.
  const baseHref = location.href.replace(/[^/]*$/, '');
  const bodyDoc = `<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <base href="${escapeHtml(baseHref)}">
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; background: transparent; color: inherit;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
          "Apple SD Gothic Neo", "Noto Sans KR", "Helvetica Neue", Arial, sans-serif;
        font-size: 17px; line-height: 1.5; word-break: break-word; overflow-wrap: anywhere; }
      body { padding: 6px 0 0; }
      img { max-width: 100% !important; height: auto !important; display: block; margin: 6px auto; border-radius: 4px; }
      a { color: #007aff; }
      table { max-width: 100% !important; }
      .plain-text { white-space: pre-wrap; }
      @media (prefers-color-scheme: dark) { body { color: #fff; } a { color: #0a84ff; } }
    </style>
  </head><body>${d.body_html || '<div class="empty">(빈 메일)</div>'}
    <script>
      // Resize parent iframe to content height
     function reportH(){

  const body = document.body;
  const html = document.documentElement;

  const h = Math.max(
    body.scrollHeight,
    body.offsetHeight,
    body.clientHeight,
    html.scrollHeight,
    html.offsetHeight,
    html.clientHeight
  );

  parent.postMessage({
    type:'mailH',
    h: h
  }, '*');
}
      window.addEventListener('load', () => { reportH(); setTimeout(reportH, 200); setTimeout(reportH, 800); });
      window.addEventListener('resize', reportH);
      const ro = new ResizeObserver(reportH); ro.observe(document.body);
      // open links in new tab
      document.addEventListener('click', e => {
        const a = e.target.closest('a');
        if (a && a.href && !a.target) a.target = '_blank';
      });
    <\/script>
  </body></html>`;
  frame.srcdoc = bodyDoc;
}

window.addEventListener('message', e => {
  if (!e.data || e.data.type !== 'mailH') return;
  const frame = document.getElementById('bodyFrame');
  if (frame && typeof e.data.h === 'number') {
    frame.style.height = (e.data.h + 80) + 'px';
  }
});

function closeDetail() {
  app.classList.remove('show-detail');
  if (location.hash.startsWith('#m=')) {
    history.pushState({}, '', location.pathname);
  }
}

  function toggleYearFilter() {

  yearFilterPanel.classList.toggle('open');

  if (!yearFilterPanel.classList.contains('open')) {
    return;
  }

  const yearMap = {};

  allMails.forEach(m => {
    const year = new Date(m.date).getFullYear();

    yearMap[year] = (yearMap[year] || 0) + 1;
  });

  const years = Object.keys(yearMap)
    .map(Number)
    .sort((a, b) => b - a);

  let html = `
    <div class="year-filter-item ${currentYearFilter === null ? 'active' : ''}"
         onclick="setYearFilter(null)">
      <span>전체</span>
      <span class="year-filter-count">${allMails.length}</span>
    </div>
  `;

  years.forEach(year => {

    html += `
      <div class="year-filter-item ${currentYearFilter === year ? 'active' : ''}"
           onclick="setYearFilter(${year})">
        <span>${year}</span>
        <span class="year-filter-count">${yearMap[year]}</span>
      </div>
    `;
  });

  yearFilterPanel.innerHTML = html;
}

function setYearFilter(year) {

  currentYearFilter = year;

  applyFilter();

  toggleYearFilter();
}

window.openMail = openMail;
window.closeDetail = closeDetail;

window.addEventListener('popstate', (e) => {
  if (e.state && e.state.mailId) {
    openMail(encodeURIComponent(e.state.mailId));
  } else {
    app.classList.remove('show-detail');
  }
});

// Load index
fetch('data/index.json')
  .then(r => r.json())
  .then(data => {
    allMails = data;
    filteredMails = data;
    renderList(true);
    if (data.length > 0) {
      const newest = data[0].date;
      if (newest) {
        const d = new Date(newest);
        if (!isNaN(d)) {
          updatedAt.textContent = '마지막 메일: ' + d.toLocaleDateString('ko-KR');
        }
      }
    }
    // open from hash if present
    const m = /^#m=(.+)$/.exec(location.hash);
    if (m) openMail(m[1]);
  })
  .catch(err => {
    listContainer.innerHTML = '<div class="empty">메일 목록을 불러올 수 없습니다.<br><small>' + escapeHtml(err.message) + '</small></div>';
  });
</script>
</body>
</html>
