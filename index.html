<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="theme-color" content="#f2f2f7">
<title>받은 편지함</title>
<style>
:root {
  --bg: #f2f2f7;
  --bg-elev: #ffffff;
  --sep: rgba(60,60,67,0.18);
  --sep-light: rgba(60,60,67,0.08);
  --text: #000000;
  --text-3: #8e8e93;
  --blue: #007aff;
  --search-bg: rgba(118,118,128,0.12);
  --row-active: rgba(118,118,128,0.18);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --bg-elev: #1c1c1e;
    --sep: rgba(84,84,88,0.65);
    --sep-light: rgba(84,84,88,0.3);
    --text: #ffffff;
    --text-3: #ebebf599;
    --blue: #0a84ff;
    --search-bg: rgba(118,118,128,0.24);
    --row-active: rgba(118,118,128,0.32);
  }
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Apple SD Gothic Neo", sans-serif;
  overflow-x: hidden;
}

body {
  -webkit-touch-callout: none;
</html>
